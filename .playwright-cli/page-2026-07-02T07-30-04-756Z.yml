            - generic [ref=e404]:
              - paragraph [ref=e405]: Le meilleur loueur dépend surtout de votre besoin. Voici les critères qui font vraiment la différence à Paris.
              - heading "La proximité de l'agence" [level=3] [ref=e406]
              - paragraph [ref=e407]: À Paris, une agence proche de chez vous ou de votre gare d'arrivée vous fait gagner un temps précieux. C'est le point fort des acteurs de proximité comme Rent A Car, quand les géants se concentrent sur les aéroports.
              - heading "Le prix et les frais cachés" [level=3] [ref=e408]
              - paragraph [ref=e409]: "Comparez le tarif total, pas seulement le prix d'appel : kilométrage, assurance de base, second conducteur, frais de restitution. Un tarif clair vaut mieux qu'une promotion assortie de suppléments."
              - heading "Le type de véhicule" [level=3] [ref=e410]
              - paragraph [ref=e411]: "Citadine pour circuler dans Paris, berline ou SUV pour un long trajet, utilitaire pour un déménagement : vérifiez que le loueur propose la bonne catégorie disponible à vos dates."
              - heading "Assurance, caution et conditions" [level=3] [ref=e412]
              - paragraph [ref=e413]: Regardez le niveau d'assurance inclus, le montant de la caution bloquée et les conditions (âge, ancienneté du permis). Ces éléments varient fortement d'un loueur à l'autre.
            - heading "Ce qu'il faut savoir avant de louer à Paris" [level=2] [ref=e414]
            - generic [ref=e415]:
              - paragraph [ref=e416]: Quelques repères pour éviter les mauvaises surprises le jour du départ.
              - heading "Documents et conditions" [level=3] [ref=e417]
              - paragraph [ref=e418]: Prévoyez une pièce d'identité, un permis de conduire valide (souvent 1 à 3 ans d'ancienneté minimum) et une carte bancaire au nom du conducteur pour la caution.
              - heading "Dépôt de garantie" [level=3] [ref=e419]
              - paragraph [ref=e420]: Une caution est bloquée sur la carte le temps de la location, puis restituée. Son montant dépend de la catégorie de véhicule.
              - heading "Réserver à l'avance" [level=3] [ref=e421]
              - paragraph [ref=e422]: À Paris, la demande est forte et les tarifs montent à l'approche de la date. Réserver tôt garantit un meilleur prix et plus de choix.
